apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  # Rolling Update Strategy for zero downtime deployments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-container
        # Notice we assume this variable matches Dockerhub. Overwrite with actual statically later if you don't use helm/kustomize
        image: aakash985/mini-wallet-backend:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        # Bonus: Health Check Endpoint configured
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 2
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP # Internal routing only
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
